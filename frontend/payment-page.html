<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - SmartPark</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-purple: #6366f1;
            --neon-pink: #ec4899;
            --neon-cyan: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0a0e27;
            --bg-darker: #050812;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 23, 42, 0.4);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, #1a1a4d 50%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: moveGradient 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes moveGradient {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .payment-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px 32px;
            box-shadow: 
                0 0 60px rgba(99, 102, 241, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, transparent 50%, rgba(236, 72, 153, 0.05) 100%);
            border-radius: 32px;
            pointer-events: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .payment-header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
            z-index: 1;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.25) 0%, rgba(236, 72, 153, 0.15) 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)) 1;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .payment-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .payment-header p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .amount-section {
            text-align: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.05) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .amount-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .amount-label {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .amount-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            font-weight: 500;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-purple);
            box-shadow: 
                0 0 0 3px rgba(99, 102, 241, 0.1),
                0 0 30px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        input:focus::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .card-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-purple);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        input:focus ~ .card-icon {
            color: var(--neon-pink);
            transform: translateY(-50%) scale(1.1);
        }

        .card-number-input {
            padding-left: 48px;
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }

        .cvv-input {
            padding-left: 48px;
            letter-spacing: 2px;
        }

        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 14px;
            padding: 14px 16px;
            margin: 32px 0;
            font-size: 13px;
            color: var(--success);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .security-icon {
            font-size: 16px;
        }

        .pay-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-pink) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(99, 102, 241, 0.4),
                0 0 40px rgba(236, 72, 153, 0.2);
            z-index: 1;
        }

        .pay-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .pay-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(99, 102, 241, 0.5),
                0 0 50px rgba(236, 72, 153, 0.3);
        }

        .pay-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .pay-button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .pay-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .encryption-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .lock-icon {
            font-size: 13px;
            color: var(--success);
        }

        .form-message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            display: none;
            font-weight: 500;
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease-out;
        }

        .form-message.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }

        .form-message.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(236, 72, 153, 0.1) 100%);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .payment-card {
                padding: 36px 24px;
                border-radius: 28px;
            }

            .payment-header {
                margin-bottom: 36px;
            }

            .payment-header h1 {
                font-size: 28px;
            }

            .amount-value {
                font-size: 40px;
            }

            .amount-section {
                padding: 24px 20px;
                margin-bottom: 32px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            body {
                padding: 12px;
            }

            input {
                padding: 14px 16px 14px 44px;
                font-size: 15px;
            }
        }

        /* Loading animation */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pay-button.loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Focus visible for accessibility */
        input:focus-visible {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="payment-card">
            <!-- Header Section -->
            <div class="payment-header">
                <div class="header-icon">
                    <i class="fas fa-credit-card"></i>
                </div>
                <h1>Secure Payment</h1>
                <p>Complete your parking payment</p>
            </div>

            <!-- Amount Section -->
            <div class="amount-section">
                <div class="amount-label">Amount Due</div>
                <div class="amount-value">₹200</div>
            </div>

            <!-- Payment Form -->
            <form id="paymentForm">
                <!-- Card Number -->
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="cardNumber" 
                            class="card-number-input"
                            placeholder="4242 4242 4242 4242" 
                            maxlength="19"
                            inputmode="numeric"
                            required
                        >
                        <i class="fas fa-credit-card card-icon"></i>
                    </div>
                </div>

                <!-- Expiry & CVV -->
                <div class="row">
                    <div class="form-group">
                        <label for="expiry">Expiry Date</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="expiry" 
                                placeholder="MM/YY" 
                                maxlength="5"
                                pattern="\d{2}/\d{2}"
                                inputmode="numeric"
                                required
                            >
                            <i class="fas fa-calendar card-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="cvv" 
                                class="cvv-input"
                                placeholder="•••" 
                                maxlength="4"
                                inputmode="numeric"
                                required
                            >
                            <i class="fas fa-lock card-icon"></i>
                        </div>
                    </div>
                </div>

                <!-- Security Info -->
                <div class="security-info">
                    <i class="fas fa-shield-alt security-icon"></i>
                    <span>256-bit SSL Encryption</span>
                </div>

                <!-- Pay Button -->
                <button type="submit" class="pay-button" id="payBtn">
                    <i class="fas fa-lock"></i> Pay ₹200
                </button>

                <!-- Message -->
                <div class="form-message" id="formMessage"></div>
            </form>

            <!-- Encryption Notice -->
            <div class="encryption-text">
                <i class="fas fa-lock lock-icon"></i>
                <span>Your transaction is protected by 256-bit encryption</span>
            </div>
        </div>
    </div>

    <script>
        // Card number formatting
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '');
            let formattedValue = value.replace(/(\d{4})/g, '$1 ').trim();
            e.target.value = formattedValue;
        });

        // Expiry date formatting
        document.getElementById('expiry').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
        });

        // CVV input - numbers only
        document.getElementById('cvv').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // Focus effects for better UX
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function(e) {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function(e) {
                this.parentElement.style.transform = 'scale(1)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });
        });

        // Form validation and submission
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;
            const payBtn = document.getElementById('payBtn');
            const formMessage = document.getElementById('formMessage');

            // Validation
            if (!validateCardNumber(cardNumber)) {
                showMessage('Invalid card number. Please check and try again.', 'error');
                return;
            }

            if (!validateExpiry(expiry)) {
                showMessage('Invalid expiry date. Please use MM/YY format.', 'error');
                return;
            }

            if (cvv.length !== 3 && cvv.length !== 4) {
                showMessage('Invalid CVV. Please enter 3 or 4 digits.', 'error');
                return;
            }

            // Disable button and show loading state
            payBtn.disabled = true;
            payBtn.classList.add('loading');
            payBtn.innerHTML = '<i class="fas fa-spinner"></i> Processing...';

            // Simulate API call
            try {
                await new Promise(resolve => setTimeout(resolve, 2500));
                
                // Success
                showMessage('✓ Payment successful! Your booking is confirmed.', 'success');
                payBtn.innerHTML = '<i class="fas fa-check"></i> Payment Confirmed';
                payBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                
                // Reset form after delay
                setTimeout(() => {
                    document.getElementById('paymentForm').reset();
                    payBtn.disabled = false;
                    payBtn.classList.remove('loading');
                    payBtn.innerHTML = '<i class="fas fa-lock"></i> Pay ₹200';
                    payBtn.style.background = '';
                    formMessage.style.display = 'none';
                }, 2500);
            } catch (error) {
                showMessage('Payment processing failed. Please try again.', 'error');
                payBtn.disabled = false;
                payBtn.classList.remove('loading');
                payBtn.innerHTML = '<i class="fas fa-lock"></i> Pay ₹200';
            }
        });

        // Validation functions
        function validateCardNumber(cardNumber) {
            // Check if it's a valid credit card using Luhn algorithm
            if (!/^\d{13,19}$/.test(cardNumber)) return false;

            let sum = 0;
            let isEven = false;

            for (let i = cardNumber.length - 1; i >= 0; i--) {
                let digit = parseInt(cardNumber[i]);

                if (isEven) {
                    digit *= 2;
                    if (digit > 9) {
                        digit -= 9;
                    }
                }

                sum += digit;
                isEven = !isEven;
            }

            return sum % 10 === 0;
        }

        function validateExpiry(expiry) {
            const regex = /^(0[1-9]|1[0-2])\/\d{2}$/;
            if (!regex.test(expiry)) return false;

            const [month, year] = expiry.split('/');
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear() % 100;
            const currentMonth = currentDate.getMonth() + 1;

            const expiryYear = parseInt(year);
            const expiryMonth = parseInt(month);

            if (expiryYear < currentYear) return false;
            if (expiryYear === currentYear && expiryMonth < currentMonth) return false;

            return true;
        }

        function showMessage(message, type) {
            const formMessage = document.getElementById('formMessage');
            formMessage.textContent = message;
            formMessage.className = `form-message ${type}`;
        }
    </script>
</body>
</html>
